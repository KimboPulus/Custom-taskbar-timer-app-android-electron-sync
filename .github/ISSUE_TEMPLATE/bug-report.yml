name: Bug report
description: Report a reproducible desktop, Android, sync, or packaging problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Windows desktop
        - Linux desktop
        - Android
        - Local sync
        - Packaging or installation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, package version, or commit hash.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Logs or diagnostics
      description: Remove private timer content, paths, and IP addresses first.
      render: text
