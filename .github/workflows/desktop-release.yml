name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run package:win
            artifact-name: focus-timer-windows
            artifact-path: desktop/release/Focus-Timer-Setup-*.exe
          - name: Linux
            os: ubuntu-latest
            command: npm run package:linux
            artifact-name: focus-timer-linux
            artifact-path: |
              desktop/release/*.AppImage
              desktop/release/*.deb
              desktop/release/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build installer packages
        working-directory: desktop
        run: ${{ matrix.command }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          cat > release-notes.md <<'NOTES'
          Desktop installers for Focus Timer.

          Windows:
          - Download and run Focus-Timer-Setup-*.exe.

          Linux:
          - openSUSE/Fedora: download the .rpm package.
          - Debian/Ubuntu: download the .deb package.
          - Other common distros: download the .AppImage, run chmod +x, then launch it.

          Taskbar timer mode and Windows system sounds are Windows-only. Normal timer mode, compact mode, daily plans, custom media alarms, and local sync are available on Linux.
          NOTES

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Focus Timer ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
